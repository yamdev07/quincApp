name: QuincApp CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: root
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: pdo_mysql, mbstring, bcmath, zip, fileinfo
          coverage: none

      - name: Create .env file from .env.testing or default
        run: |
          if [ -f .env.testing ]; then
            cp .env.testing .env
            echo "✅ .env.testing copié vers .env"
          else
            echo "⚠️ .env.testing n'existe pas, création d'un .env par défaut"
            echo "APP_NAME=QuincApp" > .env
            echo "APP_ENV=testing" >> .env
            echo "APP_KEY=" >> .env
            echo "APP_DEBUG=true" >> .env
            echo "APP_URL=http://localhost" >> .env
          fi

      - name: Override CI specific settings
        run: |
          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=true" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=testing" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env
          echo "CACHE_STORE=array" >> .env
          echo "SESSION_DRIVER=array" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env
          echo "MAIL_MAILER=array" >> .env
          echo "BROADCAST_DRIVER=log" >> .env

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader 

      - name: Generate App Key
        run: php artisan key:generate --force

      - name: Verify App Key is set
        run: |
          echo "Vérification de APP_KEY:"
          grep APP_KEY .env || echo "❌ APP_KEY manquante!"
          php artisan tinker --execute="echo 'APP_KEY OK';" || echo "❌ Erreur APP_KEY"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM Dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build Vite Assets
        run: npm run build || echo "⚠️ Build Vite ignoré"

      - name: Clear Config Cache
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear

      - name: Prepare Database
        run: |
          php artisan migrate:fresh --force
          php artisan db:seed --force || echo "⚠️ Seed ignoré"

      - name: Run Tests
        run: ./vendor/bin/phpunit
